    window.addEventListener("load", () => {
        if (window.ZombiesSolvers) {
            window.ZombiesSolvers.mountStatueSolver("statue-solver-react", { title: "Rotating Statues Solver" });

            console.error("ZombiesSolvers not loaded!");
