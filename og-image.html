<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }

        .og {
            width: 1200px;
            height: 630px;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            font-family: 'Barlow', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 52px 72px;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(201, 169, 97, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(201, 169, 97, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-l {
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 55%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(201, 169, 97, 0.09) 0%, transparent 70%);
        }

        .glow-r {
            position: absolute;
            top: -10%;
            right: 0%;
            width: 40%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(184, 154, 90, 0.06) 0%, transparent 70%);
        }

        .top {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-label {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #c9a961;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .site-label::before {
            content: '';
            display: block;
            width: 28px;
            height: 2px;
            background: #c9a961;
            flex-shrink: 0;
        }

        .domain {
            font-size: 14px;
            font-weight: 600;
            color: #808080;
            letter-spacing: 0.06em;
        }

        .middle {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .line-white {
            font-family: 'Bebas Neue', Impact, sans-serif;
            font-size: 96px;
            line-height: 1;
            color: #e5e5e5;
            letter-spacing: 0.03em;
        }

        .divider-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, #444, transparent);
        }

        .line-gold {
            font-family: 'Bebas Neue', Impact, sans-serif;
            font-size: 96px;
            line-height: 1;
            color: #c9a961;
            letter-spacing: 0.03em;
        }

        .bottom {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pills {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pill {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 3px;
        }

        .pill-gold {
            background: rgba(201, 169, 97, 0.12);
            border: 1px solid rgba(201, 169, 97, 0.4);
            color: #c9a961;
        }

        .pill-gray {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #444;
            color: #808080;
        }

        .games-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .game-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 3px;
            background: rgba(201, 169, 97, 0.1);
            border: 1px solid rgba(201, 169, 97, 0.3);
            color: #c9a961;
            white-space: nowrap;
        }

        .more-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #333;
            color: #808080;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="og">
    <div class="bg-grid"></div>
    <div class="glow-l"></div>
    <div class="glow-r"></div>

    <div class="top">
        <div class="site-label">Call of Duty Zombies</div>
        <div class="domain">mmmrkennedy.com</div>
    </div>

    <div class="middle">
        <div class="line-white">Easter Egg &amp; Quest Guides</div>
        <div class="divider-line"></div>
        <div class="line-gold">Puzzle Solvers</div>
    </div>

    <div class="bottom">
        <div class="pills">
            <div class="pill pill-gold">Step-by-Step</div>
            <div class="pill pill-gold">Interactive Tools</div>
            <div class="pill pill-gray">12 Games</div>
        </div>
        <div class="games-row">
            <div class="game-tag">BO7</div>
            <div class="game-tag">BO6</div>
            <div class="game-tag">BO4</div>
            <div class="game-tag">IW</div>
            <div class="game-tag">BO3</div>
            <div class="more-tag">&amp; 7 more</div>
        </div>
    </div>
</div>
</body>
</html>
